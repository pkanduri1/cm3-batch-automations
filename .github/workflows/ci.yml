name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Unit tests
        run: |
          pytest -q -o addopts='' tests/unit

      - name: Build Sphinx docs
        run: |
          sphinx-build -b html docs/sphinx docs/sphinx/_build/html

  integration-tests:
    runs-on: ubuntu-latest
    needs: test-and-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Integration tests (API)
        run: |
          pytest -q -o addopts='' tests/integration/

  reconcile-check:
    runs-on: ubuntu-latest
    needs: test-and-docs
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Reconcile-all drift check (optional)
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
          ORACLE_DSN: ${{ secrets.ORACLE_DSN }}
        run: |
          mkdir -p reports
          cm3-batch reconcile-all -d config/mappings -o reports/reconcile_all.json

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Start server
        run: |
          uvicorn src.api.main:app --host 127.0.0.1 --port 8000 &
          python - <<'EOF'
          import time, httpx, sys
          for i in range(20):
              try:
                  r = httpx.get("http://127.0.0.1:8000/api/v1/system/health", timeout=2)
                  if r.is_success:
                      print("Server ready")
                      sys.exit(0)
              except Exception:
                  pass
              time.sleep(0.5)
          print("Server did not start in time")
          sys.exit(1)
          EOF

      - name: Run E2E suite
        run: python3 scripts/e2e_full_ui.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/e2e-full-*/
          retention-days: 7
